<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Kampus Filter</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #14213d;
      --accent: #fca311;
      --border: #e5e5e5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --text: #e5e5e5;
        --border: #14213d;
      }
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }
    .container {
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .icon {
      color: var(--accent);
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin: 0;
    }
    p {
      color: var(--text);
      opacity: 0.7;
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 8px 0;
    }
    button {
      background-color: var(--accent);
      color: #000000;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background-color 0.15s, opacity 0.15s;
    }
    button:hover {
      background-color: #e6930f;
    }
    button:active {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 1l22 22"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"/>
      <path d="M5 12.5a10.94 10.94 0 0 1 5.83-2.84"/>
      <path d="M8.57 7.57a15.66 15.66 0 0 1 1.76-.78"/>
      <path d="M13.67 6.79a15.66 15.66 0 0 1 1.76.78"/>
      <path d="M12 20h.01"/>
    </svg>
    <h1>You are offline</h1>
    <p>It looks like you're not connected to the internet. Please check your network connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
